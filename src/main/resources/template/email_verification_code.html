<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件验证码</title>
</head>
<body style="margin:0;padding:0;background-color:rgb(255,245,242);font-family:'Microsoft YaHei',Arial,sans-serif;color:#333333;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="width:100%;background-color:rgb(255,245,242);margin:0;padding:32px 0;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:720px;width:100%;margin:0 auto;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 12px 36px rgba(255,143,132,0.18);">
                <tr>
                    <td style="background:linear-gradient(135deg, rgb(255, 143, 132), rgb(255, 176, 149));padding:28px 40px;">
                        <div style="font-size:28px;line-height:1.4;font-weight:700;color:#ffffff;">验证码通知</div>
                        <div style="margin-top:8px;font-size:14px;line-height:1.8;color:rgba(255,255,255,0.92);">
                            请使用以下验证码完成本次身份校验
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:40px;">
                        <div style="font-size:16px;line-height:1.8;color:#555555;">您好：</div>
                        <div style="margin-top:12px;font-size:16px;line-height:1.8;color:#555555;">
                            您正在进行邮箱验证操作，本次验证码如下：
                        </div>
                        <div style="margin:28px 0;padding:22px 24px;background-color:rgb(255,248,246);border:1px solid rgba(255,143,132,0.28);border-radius:16px;text-align:center;">
                            <div style="font-size:14px;line-height:1.6;color:rgb(255, 143, 132);letter-spacing:2px;">验证码</div>
                            <div style="margin-top:10px;font-size:38px;line-height:1.2;font-weight:700;letter-spacing:6px;color:rgb(255, 143, 132);">
                                ${code}
                            </div>
                        </div>
                        <div style="padding-top:24px;border-top:1px solid #f0d8d4;font-size:15px;line-height:1.9;color:#555555;">
                            验证码有效期为 <span style="font-weight:700;color:rgb(255, 143, 132);">${expireMinutes}</span> 分钟，
                            为不影响您的正常使用，请尽快完成验证。
                        </div>
                        <div style="margin-top:18px;font-size:15px;line-height:1.9;color:#555555;">
                            如果这不是您本人发起的操作，请忽略此邮件，无需进行任何处理。
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 40px 32px 40px;">
                        <div style="padding:18px 20px;background-color:rgb(255,250,249);border-radius:12px;font-size:13px;line-height:1.8;color:#8a6d68;">
                            此邮件为系统自动发送，请勿直接回复。
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 40px 36px 40px;text-align:right;">
                        <div style="font-size:22px;line-height:1.4;font-weight:700;color:rgb(255, 143, 132);">智能菜谱</div>
                        <div style="font-size:12px;line-height:1.6;color:#b08f8a;">美味生活，从这里开始</div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
